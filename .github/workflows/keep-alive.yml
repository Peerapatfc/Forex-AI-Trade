name: Keep Render Alive

on:
  schedule:
    - cron: '*/14 * * * *'  # every 14 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API
        run: |
          curl -f --max-time 30 https://forex-ai-trade.onrender.com/api/status \
            && echo "Service alive" \
            || echo "Service unreachable (waking up)"
